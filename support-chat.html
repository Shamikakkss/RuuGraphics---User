<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruu Graphics | Support Chat</title>
    <meta name="description"
        content="Ruu Graphics by Sachintha Shyamika: Expert logo design, branding, and social media marketing assets.">
    <meta name="author" content="Sachintha Shyamika">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230a0a0a'/><path d='M30 30h25c10 0 15 5 15 12s-5 12-15 12H30v16M55 54l15 16' stroke='%233b82f6' stroke-width='12' stroke-linecap='round' fill='none'/></svg>">

    <!-- External UI Frameworks & SDKs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.payhere.lk/lib/payhere.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <link rel="stylesheet" href="styles.css">
</head>

<body class="selection:bg-blue-500/40 selection:text-white" data-page="support-chat">

    <!-- Custom Confirmation Modal (bypasses browser confirm() blocks smoothly) -->
    <div id="custom-confirm-modal"
        style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);z-index:9999;align-items:center;justify-content:center;padding:1rem;">
        <div
            style="background:#141414;border:1px solid rgba(255,255,255,0.08);border-radius:1.5rem;padding:2rem;width:100%;max-width:400px;text-align:center;box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);">
            <div id="confirm-icon"
                style="width:48px;height:48px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;color:#3b82f6;font-size:1.2rem;">
                <i class="fas fa-question-circle"></i>
            </div>
            <h3 id="confirm-title" class="heading-bold" style="font-size:1.25rem;margin-bottom:0.5rem;color:#fff;">
                Confirm Action</h3>
            <p id="confirm-message" style="color:#94a3b8;font-size:0.88rem;line-height:1.5;margin-bottom:1.5rem;"></p>
            <div style="display:flex;gap:0.75rem;">
                <button id="confirm-btn-yes" class="btn-primary"
                    style="flex:1;padding:0.75rem 1rem;font-size:0.88rem;">Yes</button>
                <button id="confirm-btn-no" class="action-btn ghost"
                    style="flex:1;padding:0.75rem 1rem;font-size:0.88rem;margin:0;">No</button>
            </div>
        </div>
    </div>


    <div id="page-orders" class="page active">
        <nav class="glass-nav border-b border-white/5 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
            <div class="text-xl heading-bold uppercase tracking-tighter">Ruu<span class="text-blue-500">Graphics</span>
            </div>
            <div style="display:flex;align-items:center;gap:1rem;">
                <button class="nav-link" id="ordersNavBack" onclick="ordersNavBack()"><i class="fas fa-arrow-left"></i>
                    <span id="ordersNavLabel">My Orders</span></button>
                <div class="user-avatar-nav" title="Logged in">JS</div>
                <button onclick="handleLogout()"
                    style="background:rgba(239,68,68,0.1);color:#f87171;border:1px solid rgba(239,68,68,0.2);border-radius:0.6rem;padding:0.4rem 0.85rem;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;cursor:pointer;font-family:'Inter',sans-serif;">
                    <i class="fas fa-sign-out-alt" style="margin-right:4px;"></i>Logout
                </button>
            </div>
        </nav>
        <!-- Support Chat -->
        <div id="ov-support" class="view active-view" style="padding:2.5rem 2rem;flex-direction:column;gap:1rem;">
            <button class="nav-link" style="margin-bottom:1rem;" onclick="switchOrderView('ov-dashboard')"><i
                    class="fas fa-arrow-left"></i> Back to Orders</button>
            <div style="display:flex;flex-direction:column;gap:1rem;max-width:900px;width:100%;margin:0 auto;">
                <div
                    style="background:#111;border:1px solid rgba(255,255,255,0.07);border-radius:1.25rem;padding:1.5rem;">
                    <h3 style="font-size:1.1rem;font-weight:700;margin-bottom:0.75rem;">Support Chat</h3>
                    <p style="color:#64748b;font-size:0.9rem;">Use this chat for order questions, pre-order guidance, or
                        follow-up after delivery.</p>
                </div>
                <div
                    style="background:#111;border:1px solid rgba(255,255,255,0.07);border-radius:1.25rem;overflow:hidden;display:flex;flex-direction:column;min-height:520px;">
                    <div id="support-chat-messages" class="messages" style="flex:1;overflow-y:auto;padding:1.5rem;">
                    </div>
                    <div style="padding:1rem 1.25rem;border-top:1px solid rgba(255,255,255,0.05);">
                        <div class="chat-input-wrap">
                            <label class="icon-btn-sm attach-btn"
                                style="cursor:pointer; margin:0; display:flex; align-items:center; justify-content:center;">
                                <i class="fas fa-image"></i>
                                <input type="file" accept="image/*" style="display:none;"
                                    onchange="sendChatImage(event, 'support')">
                            </label>
                            <textarea id="support-chat-input" placeholder="Ask a question or leave a note..." rows="1"
                                onkeydown="handleSupportChatKey(event)" oninput="autoResize(this)"></textarea>
                            <button class="icon-btn-sm send-btn" onclick="sendSupportMessage()"><i
                                    class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js.js"></script>
</body>

</html>
