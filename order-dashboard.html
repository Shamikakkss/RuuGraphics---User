<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruu Graphics | My Orders</title>
    <meta name="description"
        content="Ruu Graphics by Sachintha Shyamika: Expert logo design, branding, and social media marketing assets.">
    <meta name="author" content="Sachintha Shyamika">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230a0a0a'/><path d='M30 30h25c10 0 15 5 15 12s-5 12-15 12H30v16M55 54l15 16' stroke='%233b82f6' stroke-width='12' stroke-linecap='round' fill='none'/></svg>">

    <!-- External UI Frameworks & SDKs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.payhere.lk/lib/payhere.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <link rel="stylesheet" href="styles.css">
</head>

<body class="selection:bg-blue-500/40 selection:text-white" data-page="order-dashboard">

    <!-- Custom Confirmation Modal (bypasses browser confirm() blocks smoothly) -->
    <div id="custom-confirm-modal"
        style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);z-index:9999;align-items:center;justify-content:center;padding:1rem;">
        <div
            style="background:#141414;border:1px solid rgba(255,255,255,0.08);border-radius:1.5rem;padding:2rem;width:100%;max-width:400px;text-align:center;box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);">
            <div id="confirm-icon"
                style="width:48px;height:48px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;color:#3b82f6;font-size:1.2rem;">
                <i class="fas fa-question-circle"></i>
            </div>
            <h3 id="confirm-title" class="heading-bold" style="font-size:1.25rem;margin-bottom:0.5rem;color:#fff;">
                Confirm Action</h3>
            <p id="confirm-message" style="color:#94a3b8;font-size:0.88rem;line-height:1.5;margin-bottom:1.5rem;"></p>
            <div style="display:flex;gap:0.75rem;">
                <button id="confirm-btn-yes" class="btn-primary"
                    style="flex:1;padding:0.75rem 1rem;font-size:0.88rem;">Yes</button>
                <button id="confirm-btn-no" class="action-btn ghost"
                    style="flex:1;padding:0.75rem 1rem;font-size:0.88rem;margin:0;">No</button>
            </div>
        </div>
    </div>


    <div id="page-orders" class="page active">
        <nav class="glass-nav border-b border-white/5 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
            <div class="text-xl heading-bold uppercase tracking-tighter">Ruu<span class="text-blue-500">Graphics</span>
            </div>
            <div style="display:flex;align-items:center;gap:1rem;">
                <button class="nav-link" id="ordersNavBack" onclick="ordersNavBack()"><i class="fas fa-arrow-left"></i>
                    <span id="ordersNavLabel">Portfolio</span></button>
                <div class="user-avatar-nav" title="Logged in">JS</div>
                <button onclick="handleLogout()"
                    style="background:rgba(239,68,68,0.1);color:#f87171;border:1px solid rgba(239,68,68,0.2);border-radius:0.6rem;padding:0.4rem 0.85rem;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;cursor:pointer;font-family:'Inter',sans-serif;">
                    <i class="fas fa-sign-out-alt" style="margin-right:4px;"></i>Logout
                </button>
            </div>
        </nav>
        <div id="ov-dashboard" class="view active-view" style="padding:2.5rem 2rem;">
            <div
                style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2.5rem;flex-wrap:wrap;gap:1rem;">
                <div>
                    <h1 class="heading-bold" style="font-size:2rem;">My <span style="color:#3b82f6;">Orders</span></h1>
                    <p style="color:#64748b;font-size:0.85rem;margin-top:0.35rem;">Manage and track all your design
                        orders</p>
                </div>
                <div style="display:flex;gap:0.75rem;flex-wrap:wrap;align-items:center;">
                    <button class="btn-primary" onclick="openSupportChat()"
                        style="background:#111;border:1px solid rgba(255,255,255,0.08);color:#94a3b8;"> <i
                            class="fas fa-comments"></i> Support Chat</button>
                    <button class="btn-primary" onclick="switchOrderView('ov-form')"><i class="fas fa-plus"></i> New
                        Order</button>
                </div>
            </div>
            <!-- Stats -->
            <div
                style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:2.5rem;">
                <div class="stat-card">
                    <div
                        style="font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;color:#64748b;margin-bottom:0.5rem;">
                        Total Orders</div>
                    <div id="stat-total" style="font-size:1.8rem;font-weight:800;letter-spacing:-0.03em;color:#3b82f6;">
                        0</div>
                </div>
                <div class="stat-card">
                    <div
                        style="font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;color:#64748b;margin-bottom:0.5rem;">
                        Pending</div>
                    <div id="stat-pending"
                        style="font-size:1.8rem;font-weight:800;letter-spacing:-0.03em;color:#f59e0b;">0</div>
                </div>
                <div class="stat-card">
                    <div
                        style="font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;color:#64748b;margin-bottom:0.5rem;">
                        In Progress</div>
                    <div id="stat-progress"
                        style="font-size:1.8rem;font-weight:800;letter-spacing:-0.03em;color:#3b82f6;">0</div>
                </div>
                <div class="stat-card">
                    <div
                        style="font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;color:#64748b;margin-bottom:0.5rem;">
                        Completed</div>
                    <div id="stat-done" style="font-size:1.8rem;font-weight:800;letter-spacing:-0.03em;color:#22c55e;">0
                    </div>
                </div>
                <div class="stat-card">
                    <div
                        style="font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;color:#64748b;margin-bottom:0.5rem;">
                        Total Spent</div>
                    <div id="stat-spent" style="font-size:1.6rem;font-weight:800;letter-spacing:-0.03em;color:#a855f7;">
                        $0</div>
                </div>
            </div>
            <div
                style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.18em;color:#64748b;margin-bottom:1rem;">
                Recent Orders</div>
            <div id="orders-list" style="display:flex;flex-direction:column;gap:0.75rem;"></div>
        </div>
    </div>

    <script type="module" src="js.js"></script>
</body>

</html>
